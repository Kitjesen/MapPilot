# ══════════════════════════════════════════════════════════
# OTA Daemon 配置 — 独立守护进程, 不依赖 ROS2
# systemd: ota_daemon.service | 端口: 50052
# ══════════════════════════════════════════════════════════

# ── 网络 ──
grpc_port: 50052
bind_address: "0.0.0.0"

# ── 设备标识 ──
robot_id: ""        # 留空则从 device_id_file 读取（与 Python Agent 共享）
hw_id: "jetson-orin-nx-16"

# ── OTA 状态文件 (与 Python Agent 共享同一 base_dir) ──
ota_manifest_path: "/opt/lingtu/nav/ota/installed_manifest.json"
ota_backup_dir: "/opt/lingtu/nav/ota/backup"
ota_history_path: "/opt/lingtu/nav/ota/upgrade_history.jsonl"
system_version_path: "/opt/lingtu/nav/ota/system_version.json"

# ── 下载暂存 (替代 /tmp, 受 systemd ReadWritePaths 保护) ──
staging_dir: "/opt/lingtu/nav/ota/staging"

# ── Ed25519 公钥 (设备端验签, 留空=跳过) ──
# Ed25519 公钥路径 — 部署时需将 server.pub 复制到此路径并启用
# 生成方法: openssl genpkey -algorithm ed25519 -out server.pem && openssl pkey -in server.pem -pubout -out server.pub
# 留空 = 跳过签名验证 (仅开发环境使用，生产环境必须填写)
ota_public_key_path: "/opt/lingtu/nav/ota/keys/server.pub"

# ── TLS (留空=明文) ──
tls_cert_path: ""
tls_key_path: ""

# ── systemd 服务管理 ──
managed_services:
  - "nav-lidar.service"
  - "nav-slam.service"
  - "nav-autonomy.service"
  - "nav-planning.service"
  - "nav-grpc.service"
  - "ota-daemon.service"

# ── 健康检查超时 (秒) ──
health_check_timeout_sec: 30

# ── 日志级别: DEBUG, INFO, WARN, ERROR ──
log_level: "INFO"

# ── Dog Board 配置 (Nav Board 代理 OTA 到 Dog Board) ──
# ota_daemon 运行在 Nav Board, 通过 Ethernet 连接 Dog Board
# 模型文件先 copy 到本地, 再通知 Dog Board 热加载
dog_board:
  host: "192.168.123.161"         # Dog Board 的 IP (内部以太网)
  port: 13145                     # Dog Board CMS gRPC 端口
  # 模型热加载通知脚本 (copy 后执行, 参数: <model_path> <dog_host> <dog_port>)
  reload_script: "/opt/robot/scripts/reload_dog_model.sh"
  # 连接超时 (秒)
  timeout_sec: 5

# ── infra/ota Server 上报配置 ──
# 每次 ApplyUpdate 成功/失败后向 OTA Server 发送报告
# 使设备管理界面能实时看到 daemon 执行的部署（而不只是 Agent 的拉取部署）
reporter:
  enabled: true
  server_url: "https://ota.inovxio.com/api"    # 替换为实际地址
  # 与 Python Agent 共享同一个 device_id 文件（单一设备身份）
  device_id_file: "/opt/lingtu/nav/ota/device_id"
  api_key_file: "/opt/lingtu/nav/ota/api_key"   # 可选，留空则不带认证头

# ── 目录白名单 (仅允许上传/安装到以下路径) ──
allowed_directories:
  # 模型 (步态/感知/规划)
  - "/home/sunrise/models"
  # 导航栈 (colcon install 输出)
  - "/home/sunrise/data/SLAM/navigation/install"
  - "/home/sunrise/data/SLAM/navigation/maps"
  - "/home/sunrise/data/SLAM/navigation/src/global_planning"
  # 固件 (deb/bin 等需要 root 安装的)
  - "/opt/lingtu/nav/firmware"
  # OTA 暂存
  - "/opt/lingtu/nav/ota/staging"

# ── 制品路径映射 ──
# 详见 artifact_paths.yaml (同目录, 自动加载)
# 接收方在 artifact_paths.yaml 中定义每个制品的实际安装路径
# manifest 中的 target_path 仅作为兜底, 优先级最低
